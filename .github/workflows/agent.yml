name: REIT Agent — Daily Run

on:
  schedule:
    # 13:00 UTC = 18:30 IST, weekdays only
    - cron: "0 13 * * 1-5"
  workflow_dispatch:   # allows manual trigger from GitHub UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run agent
        env:
          BOT_TOKEN:     ${{ secrets.BOT_TOKEN }}
          CHAT_ID:       ${{ secrets.CHAT_ID }}
          NEWS_API_KEY:  ${{ secrets.NEWS_API_KEY }}
          MONTHLY_CAP:   "5000"
          MIN_ORDER:     "500"
          BUY_THRESHOLD: "4"
        run: python run_once.py

      - name: Save purchase log to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Stage purchases.csv only if it exists
          if [ -f purchases.csv ]; then
            git add purchases.csv
          fi
          # Only commit + push if there is actually something staged
          if git diff --staged --quiet; then
            echo "No changes to commit — skipping push."
          else
            git commit -m "chore: update purchases log [$(date +'%Y-%m-%d')]"
            git pull --rebase origin main
            git push origin main
          fi